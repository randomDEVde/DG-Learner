name: Build Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_args:
        description: "Tauri Android build arguments, z. B. --apk oder --apk --split-per-abi"
        required: false
        default: "--apk"
        type: string

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_API_LEVEL: "36"
      ANDROID_BUILD_TOOLS: "36.0.0"
      ANDROID_NDK_VERSION: "27.0.12077973"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android Rust Targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses

      - name: Install Android SDK Packages
        run: sdkmanager --install "platform-tools" "platforms;${ANDROID_API_LEVEL}" "build-tools;${ANDROID_BUILD_TOOLS}" "ndk;${ANDROID_NDK_VERSION}"

      - name: Export Android Environment
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "NDK_HOME=${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" >> "$GITHUB_ENV"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Android Bundle
        env:
          CI: "true"
          ANDROID_BUILD_ARGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.build_args || '--apk' }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: bash ./android_apk_build.sh

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-bundles-${{ github.run_number }}
          if-no-files-found: error
          path: |
            frontend/src-tauri/gen/android/app/build/outputs/**/*.apk
            frontend/src-tauri/gen/android/app/build/outputs/**/*.aab
